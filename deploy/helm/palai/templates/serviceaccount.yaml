{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "palai.serviceAccountName" . }}
  labels:
    {{- include "palai.labels" . | nindent 4 }}
# The control-plane makes NO Kubernetes API calls, so it needs no token mounted into the pod.
automountServiceAccountToken: {{ .Values.serviceAccount.automountToken }}
{{- end -}}
