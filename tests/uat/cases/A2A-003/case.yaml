input: "The A2A task lifecycle maps onto canonical run states: a run awaiting input projects to A2A input-required (waiting_for_input). cancel issues a canonical cancel Command (monotonic, retry-safe) AND reports any non-cancelable uncertain side-effect honestly rather than claiming a clean cancel (§38.3). pushNotificationConfigs expose the CONFIG CRUD only (set/get/list/delete) — the bearer token is stored and redacted on every read (never echoed back) under RLS, NOT a secret_ref handle. HONEST CEILING: push DELIVERY is not wired (no Pusher), so the Agent Card advertises pushNotifications only when a Pusher exists — it reads false here; a real signed delivery reusing the outbound webhook model is the §6 operator leg. LOCAL proof: a generic loopback HTTP client drives the input-required mapping, the cancel-with-uncertain-side-effect report, and the full push-config CRUD (token-redaction asserted) against the server with in-memory fakes. §6 operator leg: a real signed push delivered to a FOREIGN receiver + foreign-peer interop (loopback != interop) — a2a stays preview."
expect_status: completed
