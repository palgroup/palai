id: WRK-004
name: secret-handle-is-job-scoped-short-lived-and-its-value-never-lands-in-receipt-or-journal
proof_class: component-real
provider: fake
input: "A job-scoped, short-lived secret HANDLE (§31.5): a handle names a secret_ref (000031), is redeemable ONLY for the job that named it (an unscoped handle is refused) and ONLY before the job deadline (it EXPIRES with the deadline), and the redeem is fenced (a fenced-out worker cannot redeem). The resolved VALUE is handed to the worker for use but NEVER written to the journal, a log, or the receipt — only the ref NAME is stored. LOCAL proof: component-real scope + expiry + value-never-journaled, and the two-sided-live worker redeems a handle, sets secret_redeemed=true WITHOUT the value, and the marker appears in neither the process output nor the journal. RED-first: disabling the scope or the deadline guard redeems a foreign/expired handle. No signing credential exists to hand out anywhere (§6 leg 3)."
expect_status: completed
proof:
  - apps/control-plane/internal/workers/workers_component_test.go:TestSecretHandleScopeAndExpiry
  - apps/control-plane/internal/workers/live/worker_live_test.go:TestTwoSidedTypedJobRoundTrip
