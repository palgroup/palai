asyncapi: 3.1.0
info:
  title: Palai Session Events
  version: 1.0.0
  description: >-
    Server-to-client event stream for a Palai session. Every message is a
    CloudEvents 1.0 envelope (see execution/event.json) delivered in per-session
    monotonic sequence order.
defaultContentType: application/json
channels:
  sessionEvents:
    address: /v1/sessions/{session_id}/events
    description: >-
      Ordered event stream for a single session, delivered over Server-Sent
      Events (text/event-stream).
    parameters:
      session_id:
        description: Canonical session identifier (ses_*) whose events are streamed.
    messages:
      event:
        $ref: '#/components/messages/event'
operations:
  receiveSessionEvents:
    action: receive
    summary: Receive the ordered event stream for a session.
    channel:
      $ref: '#/channels/sessionEvents'
    messages:
      - $ref: '#/channels/sessionEvents/messages/event'
    x-sse-binding:
      contentType: text/event-stream
      lastEventIdHeader: Last-Event-ID
      note: >-
        The stream is a Server-Sent Events response. A client resumes after a
        drop by sending Last-Event-ID with the last delivered event id; the
        server replays from the next per-session sequence.
components:
  messages:
    event:
      name: event
      title: Session event envelope
      summary: A single CloudEvents 1.0 envelope carrying a session state change.
      contentType: application/json
      payload:
        $ref: '../schemas/execution/event.json'
      x-event-types:
        - session.created.v1
        - session.active.v1
        - session.paused.v1
        - session.closing.v1
        - session.closed.v1
        - session.deleted.v1
        - message.accepted.v1
        - response.queued.v1
        - response.provisioning.v1
        - response.in_progress.v1
        - response.waiting_for_tool.v1
        - response.waiting_for_approval.v1
        - response.waiting_for_input.v1
        - response.completed.v1
        - response.failed.v1
        - response.canceled.v1
        - response.timed_out.v1
        - response.budget_exceeded.v1
        - run.queued.v1
        - run.provisioning.v1
        - run.running.v1
        - run.waiting.v1
        - run.completed.v1
        - run.failed.v1
        - run.canceled.v1
        - run.timed_out.v1
        - run.budget_exceeded.v1
        - attempt.assigned.v1
        - attempt.starting.v1
        - attempt.active.v1
        - attempt.draining.v1
        - attempt.succeeded.v1
        - attempt.failed.v1
        - attempt.lost.v1
        - attempt.preempted.v1
        - command.accepted.v1
